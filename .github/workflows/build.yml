name: Build FlatCraft

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "Nuitka[onefile]" ordered-set

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile `
            --windows-console-mode=disable `
            --output-filename=flatcraft.exe `
            --include-package=src `
            --include-package=arcade `
            --include-package=scipy `
            --include-package=numpy `
            --include-package=PIL `
            --include-package=pydantic `
            --include-package=psutil `
            --include-package=perlin_noise `
            --include-data-dir=assets=assets `
            --output-dir=builds `
            --assume-yes-for-downloads `
            --msvc=latest `
            src\main.py

      - uses: actions/upload-artifact@v4
        with:
          name: flatcraft-windows
          path: builds/flatcraft.exe
          retention-days: 30

  build-linux:
    name: Linux (binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "Nuitka[onefile]" ordered-set

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile \
            --output-filename=flatcraft \
            --include-package=src \
            --include-package=arcade \
            --include-package=scipy \
            --include-package=numpy \
            --include-package=PIL \
            --include-package=pydantic \
            --include-package=psutil \
            --include-package=perlin_noise \
            --include-data-dir=assets=assets \
            --output-dir=builds \
            --assume-yes-for-downloads \
            src/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: flatcraft-linux
          path: builds/flatcraft
          retention-days: 30
