name: Build FlatCraft

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: flake8
        run: python -m flake8 src/

      - name: mypy
        run: python -m mypy src/

  build-windows:
    name: Windows (.exe)
    needs: lint
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "Nuitka[onefile]" ordered-set

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --standalone `
            --windows-console-mode=disable `
            --enable-plugin=multiprocessing `
            --windows-icon-from-ico=assets/icons/flatcraft.ico `
            --output-filename=flatcraft.exe `
            --output-dir=builds `
            --include-package=src `
            --include-package=arcade `
            --include-package=pydantic `
            --include-package=pydantic_core `
            --include-package=scipy `
            --include-package=perlin_noise `
            --include-package=psutil `
            --include-package=PIL `
            --nofollow-import-to=*.tests `
            --include-data-dir=assets=assets `
            --assume-yes-for-downloads `
            --msvc=latest `
            src\main.py

      - uses: actions/upload-artifact@v4
        with:
          name: flatcraft-windows
          path: builds/flatcraft.exe
          retention-days: 30

  build-linux:
    name: Linux (binary)
    needs: lint
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "Nuitka[onefile]" ordered-set

      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --standalone \
            --enable-plugin=multiprocessing \
            --output-filename=flatcraft \
            --output-dir=builds \
            --include-package=src \
            --include-package=arcade \
            --include-package=pydantic \
            --include-package=pydantic_core \
            --include-package=scipy \
            --include-package=perlin_noise \
            --include-package=psutil \
            --include-package=PIL \
            --nofollow-import-to=*.tests \
            --include-data-dir=assets=assets \
            --assume-yes-for-downloads \
            src/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: flatcraft-linux
          path: builds/flatcraft
          retention-days: 30

  build-macos:
    name: macOS (.app)
    needs: lint
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "Nuitka[onefile]" ordered-set imageio

      - name: Build with Nuitka
        run: |
          python -m nuitka \
            --macos-create-app-bundle \
            --macos-app-name=FlatCraft \
            --standalone \
            --enable-plugin=multiprocessing \
            --macos-app-icon=assets/icons/flatcraft.png \
            --output-filename=flatcraft \
            --output-dir=builds \
            --include-package=src \
            --include-package=arcade \
            --include-package=pydantic \
            --include-package=pydantic_core \
            --include-package=scipy \
            --include-package=perlin_noise \
            --include-package=psutil \
            --include-package=PIL \
            --nofollow-import-to=*.tests \
            --include-data-dir=assets=assets \
            --assume-yes-for-downloads \
            src/main.py

      - name: Find and zip .app bundle
        run: |
          cd builds
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            zip -r flatcraft-macos.zip "$APP_PATH"
          else
            echo "::warning::.app bundle not found, skipping zip"
            touch flatcraft-macos.zip
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flatcraft-macos
          path: builds/flatcraft-macos.zip
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: flatcraft-windows
          path: release/

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: flatcraft-linux
          path: release/

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: flatcraft-macos
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/flatcraft.exe
            release/flatcraft
            release/flatcraft-macos.zip
          generate_release_notes: true
